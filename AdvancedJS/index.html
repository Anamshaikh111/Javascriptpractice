    <h1 class="textColor redText" style="text-align: center;">This is heading</h1>

    <script>
        let myPromise = new Promise((resolve, reject) => {
            resolve("Successfully resolved")
        });

        myPromise
        .then((data) => {
            console.log(data);
        })
        .catch((error) => {
            console.error("Something went wrong: ", error);
        });
    </script>
<script>
    let MyPromise = new Promise((resolve, reject) => {
            let success = false

            if (success) {
                resolve("Data fetch Successfully")
            } else {
                reject("Error While fetching data")
            }
        })

        MyPromise
            .then((result) => {
                console.log("Success", result)
            })

            .catch((error) => {
                console.log("Error", error)
            })

        //Promise 3rd Example

        let pizzaPromise = new Promise((resolve, reject) => {

            setTimeout(() => {

                let isAvailable = true

                if (isAvailable) {
                    resolve("Pizza delivered!")
                } else {
                    reject("Pizza shop closed.")
                }

            }, 2000)

        })

        pizzaPromise

            .then((message) => {
                console.log("Yay!", message)
            })


            .catch((err) => {
                console.log("Oops!", err)
            })

        //async/await
        async function fetchWeather() {
            await fetch("api for weather")
                .then(res => res.json())
                .then(data => console.log(data))
                .catch(error => console.log(error))
        }
        setInterval(() => {
            console.log("Helloooooo after 5 sec")
        }, 5000)
    </script>

<div class="container" style="text-align: center;">
    <h3>
        <h2 id="demo"></h2>
        <span id="hr"></span>
        :
        <span id="min"></span>
        :
        <span id="sec"></span>
    </h3>
</div>

    <script>
        function getDigiClock(){
            const today = new Date()
            console.log(today)

            let dayDate = today.toDateString()
            document.getElementById("demo").textContent =  dayDate

            hr = today.getHours()
            console.log(hr)
            document.getElementById("hr").textContent = hr

            min = today.getMinutes()
            console.log(hr)
            document.getElementById("min").textContent = min

            sec = today.getSeconds()
            console.log(sec)
            document.getElementById("sec").textContent = sec

        }

        setInterval(getDigiClock,1000)

    </script>

</body>
</html>
